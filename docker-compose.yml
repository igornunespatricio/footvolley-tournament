services:
  postgres:
    image: postgres:15-alpine
    container_name: footvolley-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-footvolley}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-footvolley123}
      POSTGRES_DB: ${DB_NAME:-footvolley}
    ports:
      - "${DB_PORT:-5432}:5432"
    # limit cpu and memory usage for the postgres service
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-footvolley}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tournament-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: footvolley-backend
    environment:
      DB_USER: ${DB_USER:-footvolley}
      DB_PASSWORD: ${DB_PASSWORD:-footvolley123}
      DB_NAME: ${DB_NAME:-footvolley}
      DB_HOST: postgres
      DB_PORT: 5432
      PORT: ${BACKEND_PORT:-3001}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "${BACKEND_PORT:-3001}:${BACKEND_PORT:-3001}"
    # limit cpu and memory usage for the backend service
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - tournament-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api}
    container_name: footvolley-frontend
    # environment:
    #   VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    # limit cpu and memory usage for the frontend service
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M 
    depends_on:
      - backend
    networks:
      - tournament-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  tournament-network:
    driver: bridge
